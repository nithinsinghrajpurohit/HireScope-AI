# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini for code review, refactoring, and UI enhancements. Used Cursor for autocomplete.
  No candidate data was shared with external API endpoints during the scoring execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal rule-based ranking engine with 5 weighted dimensions (Skills 35%, Title/Career 25%, Experience 15%, Education 10%, Behavioral 15%). Includes a Jaccard-based company diversity deduplication filter, a dynamic regex JD parser, fuzzy skill canonical matching, and custom time-decay recency weighting for skills. The engine filters out honeypot profiles via 9 consistency checks (Temporal, Academic, Salary, Career duration) and penalizes keyword stuffing using a proficiency-duration-endorsement trust multiplier.

